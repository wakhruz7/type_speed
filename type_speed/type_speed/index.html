<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type-Speed Tester | GitHub Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tez yozish testi</h1>
        <div class="stats-container">
            <div class="stat-box">
                <span class="label">Vaqt</span>
                <span id="timer" class="value">60</span>
            </div>
            <div class="stat-box">
                <span class="label">WPM</span>
                <span id="wpm" class="value">0</span>
            </div>
            <div class="stat-box">
                <span class="label">Xatolar</span>
                <span id="errors" class="value">0</span>
            </div>
        </div>

        <div id="text-display" class="text-display">
            </div>

        <textarea id="input-field" class="input-field" placeholder="Yozishni shu yerda boshlang..." autofocus></textarea>

        <button id="reset-btn" class="reset-btn">Qayta boshlash</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
